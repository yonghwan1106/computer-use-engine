# CUE — Computer Use Enforcer: Safety Configuration
# Policies controlling how AI agents interact with the desktop.
safety:
  # Maximum actions per session (0 = unlimited)
  max_actions_per_session: 100

  # Pause duration (seconds) between actions for safety
  action_delay: 0.05

  # pyautogui FAILSAFE — moving mouse to (0,0) aborts
  failsafe: true

  # Application allowlist (empty = allow all)
  # Only these apps can be targeted by focus/click actions
  allowed_apps: []

  # Application blocklist — these apps are never targeted
  blocked_apps:
    - "Windows Security"
    - "Registry Editor"
    - "Task Manager"

  # Blocked key combinations
  blocked_keys:
    - "win+r"        # Run dialog
    - "alt+f4"       # Close window (use with caution)
    - "ctrl+alt+del" # System interrupt

screenshot:
  # Output format
  format: "JPEG"
  # JPEG quality (1-100)
  quality: 80
  # Max dimension (longest side) — larger images are resized
  max_dimension: 1568

logging:
  # Enable JSON Lines audit logging
  enabled: true
  # Log file path (relative to CWD or absolute)
  path: "cue_audit.jsonl"
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"

# Policy engine — rule-based action evaluation (Phase 1)
policies:
  enabled: true
  default_action: allow
  rules:
    - name: block_system_keys
      conditions:
        risk_level: CRITICAL
        tool: cue_key
      action: deny
      reason: "System-level key combinations are blocked."

    - name: block_admin_apps
      conditions:
        target_app:
          - "Windows Security"
          - "Registry Editor"
          - "Task Manager"
      action: deny
      reason: "Administrative applications are blocked."

    - name: warn_high_risk
      conditions:
        risk_level: HIGH
      action: warn
      reason: "Action classified as high risk."

    - name: allow_readonly
      conditions:
        tool:
          - cue_screenshot
          - cue_screen_size
          - cue_cursor_position
          - cue_list_windows
          - cue_window_info
      action: allow
      reason: "Read-only tools are always allowed."
